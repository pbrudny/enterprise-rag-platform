# Mock tenant/user directory — stands in for a real SSO/IdP integration.
tenants:
  - tenant_id: acme-corp
    name: Acme Corp
    region: eu
  - tenant_id: globex-inc
    name: Globex Inc
    region: us
  - tenant_id: initech
    name: Initech
    region: apac

users:
